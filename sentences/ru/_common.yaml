    duplicate_entities_in_area: "袛褍斜谢懈褉芯胁邪薪懈械 薪邪蟹胁邪薪懈泄. 袧械褋泻芯谢褜泻芯 芯斜褗械泻褌芯胁 {{ entity }} 胁 {{ area }}"
    duplicate_entities_in_floor: "袛褍斜谢懈褉芯胁邪薪懈械 薪邪蟹胁邪薪懈泄. 袧械褋泻芯谢褜泻芯 芯斜褗械泻褌芯胁 {{ entity }} 薪邪 褝褌邪卸械"

    # Errors for timers
    timer_not_found: "孝邪泄屑械褉 薪械 薪邪泄写械薪"
