    no_entity_in_floor_exposed: "袛芯褋褌褍锌 泻 芯斜褗械泻褌褍 {{ entity }} 薪邪 褝褌邪卸械 薪械 锌褉械写芯褋褌邪胁谢械薪"
    no_domain_exposed: "袛芯褋褌褍锌 泻 {{ domain }} 薪械 锌褉械写芯褋褌邪胁谢械薪"
    no_domain_in_area_exposed: "袛芯褋褌褍锌 泻 {{ domain }} 胁 {{ area }} 薪械 锌褉械写芯褋褌邪胁谢械薪"
    no_domain_in_floor_exposed: "袛芯褋褌褍锌 泻 {{ domain }} 薪邪 褝褌邪卸械 薪械 锌褉械写芯褋褌邪胁谢械薪"
