    no_timer_support: "孝邪泄屑械褉褘 薪械 锌芯写写械褉卸懈胁邪褞褌褋褟 薪邪 写邪薪薪芯屑 褍褋褌褉芯泄褋褌胁械"
lists:
  color:
    values:
      - in: "斜械谢褘泄|斜械谢芯谐芯|斜械谢褘屑|斜械谢芯泄"
        out: "white"
      - in: "褉芯蟹芯胁褘泄|褉芯蟹芯胁芯谐芯|褉芯蟹芯胁褘屑|褉芯蟹芯胁芯泄"
        out: "crimson"
      - in: "泻褉邪褋薪褘泄|泻褉邪褋薪芯谐芯|泻褉邪褋薪褘屑|泻褉邪褋薪芯泄"
        out: "red"
      - in: "芯褉邪薪卸械胁褘泄|芯褉邪薪卸械胁芯谐芯|芯褉邪薪卸械胁褘屑|芯褉邪薪卸械胁芯泄"
        out: "orange"
      - in: "卸械谢褌褘泄|卸械谢褌芯谐芯|卸械谢褌褘屑|卸械谢褌芯泄|卸褢谢褌褘泄|卸褢谢褌芯谐芯|卸褢谢褌褘屑|卸褢谢褌芯泄"
        out: "goldenrod"
      - in: "蟹械谢械薪褘泄|蟹械谢械薪芯谐芯|蟹械谢械薪褘屑|蟹械谢褢薪芯泄|蟹械谢褢薪褘泄|蟹械谢褢薪芯谐芯|蟹械谢褢薪褘屑|蟹械谢褢薪芯泄"
        out: "green"
      - in: "谐芯谢褍斜芯泄|谐芯谢褍斜芯谐芯|谐芯谢褍斜褘屑"
        out: "skyblue"
      - in: "褋懈薪懈泄|褋懈薪械谐芯|褋懈薪懈屑|褋懈薪械泄"
        out: "blue"
      - in: "褎懈芯谢械褌芯胁褘泄|褎懈芯谢械褌芯胁芯谐芯|褎懈芯谢械褌芯胁褘屑|褎懈芯谢械褌芯胁芯泄"
        out: "purple"

  brightness:
    range:
      type: "percentage"
      from: 0
      to: 100
  temperature:
    range:
      type: "temperature"
      from: 0
      to: 100
  on_off_states:
    values:
      - in: "(胁泻谢褞褔械薪[邪|芯|褘|薪邪褟|薪芯械|薪褘泄|薪褘械|薪褘褏|薪芯谐芯])"
        out: "on"
      - in: "(胁褘泻谢褞褔械薪[邪|芯|褘|薪邪褟|薪芯械|薪褘泄|薪褘械|薪褘褏|薪芯谐芯])"
        out: "off"
  on_off_domains:
    values:
      - in: "(褋胁械褌[邪|芯屑]|芯褋胁械褖械薪懈(械|械屑|褟)|谢邪屑锌[a|褍|褘|芯泄|邪屑懈]|褋胁械褌懈谢褜薪懈泻[邪|懈|芯胁|芯屑|邪屑懈])"
        out: light
      - in: "胁械薪褌懈谢褟褌芯褉[褘|芯胁]"
        out: fan
      - in: "胁褘泻谢褞褔邪褌械谢(懈|褜|械泄)"
        out: switch
  cover_states:
    values:
      - in: "芯褌泻褉褘褌[邪|芯|褘|芯泄|邪褟|褘械|褍褞]|薪械[ ]蟹邪写械褉薪褍褌[邪|芯|褘|芯泄|邪褟|褘械|褍褞]|锌芯写薪褟褌[邪|芯|褘|芯泄|邪褟|褘械|褍褞]"
        out: "open"
      - in: "蟹邪泻褉褘褌[邪|芯|褘|芯泄|邪褟|褘械|褍褞]|蟹邪写械褉薪褍褌[邪|芯|褘|芯泄|邪褟|褘械|褍褞]|芯锌褍褖械薪[邪|芯|褘|芯泄|邪褟|褘械|褍褞]"
        out: "closed"
      - in: "芯褌泻褉褘胁邪(械|褞)褌褋褟|锌芯写薪懈屑邪(械|褞)褌褋褟"
        out: "opening"
      - in: "蟹邪泻褉褘胁邪(械|褞)褌褋褟|芯锌褍褋泻邪(械|褞)褌褋褟"
        out: "closing"
  cover_classes:
    values:
      - in: "薪邪胁械褋[褘|芯胁]"
        out: "awning"
      - in: "卸邪谢褞蟹懈"
        out: "blind"
      - in: "褕褌芯褉[褍|邪|褘]|蟹邪薪邪胁械褋泻(褍|邪|懈|芯泻)"
        out: "curtain"
      - in: "[锌褉懈褌芯褔薪(褘泄|褘械|褘褏) ]泻谢邪锌邪薪[褘|懈|芯胁]|蟹邪褋谢芯薪泻(褍|邪|懈|芯泻)"
        out: "damper"
      - in: "写胁械褉(褜|懈|械泄)|泻邪谢懈褌泻(邪|懈|芯泻)"
        out: "door"
