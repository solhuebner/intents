    no_entity: "袨褌褋褍褌褋褌胁褍械褌 芯斜褗械泻褌 {{ entity }}"
    no_entity_in_area: "袨褌褋褍褌褋褌胁褍械褌 芯斜褗械泻褌 {{ entity }} 胁 {{ area }}"
