language: hy
intents:
  HassGetState:
    data:
      # Battery
      - sentences:
          - "{bs_battery_states:state}[ է][ արդյոք] <name>[ մարտկոցը] [<area>]"
          - "<name>[ մարտկոցը] {bs_battery_states:state}[ է][ արդյոք] [<area>]"
        response: one_yesno
        requires_context:
          domain: binary_sensor
          device_class: battery
        slots:
          domain: binary_sensor
          device_class: battery

      - sentences:
          - "կա[ն][ արդյոք] [որևէ ]մարտկոց [որը ]{bs_battery_states:state}[ է] [<area>]"
          - "[որևէ ]մարտկոց {bs_battery_states:state}[ է][ արդյոք] [<area>]"
        response: any
        slots:
          domain: binary_sensor
          device_class: battery

      - sentences:
          - "բոլոր մարտկոցները {bs_battery_states:state}[ են][ արդյոք] [<area>]"
        response: all
        slots:
          domain: binary_sensor
          device_class: battery

      - sentences:
          - "որ մարտկոցն[երն] [է|են] {bs_battery_states:state} [<area>]"
        response: which
        slots:
          domain: binary_sensor
          device_class: battery

      - sentences:
          - "քանի մարտկոց է {bs_battery_states:state} [<area>]"
        response: how_many
        slots:
          domain: binary_sensor
          device_class: battery

