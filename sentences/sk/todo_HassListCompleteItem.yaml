language: "sk"
intents:
  HassListCompleteItem:
    data:
      - sentences:
          - ([(vy|od)]škrtn(i|úť)|dokonči[ť]) ([položku ]<item>;(z[o]|na|v[o]) <my_list>)
          - označ[iť] [položku] <item> v[o] <my_list> ako dokončenú
        response: item_completed
        expansion_rules:
          my_list: "[(mojom|môjho)] [zoznam(e|u)] {name}"
          item: "{todo_list_item:item}"
