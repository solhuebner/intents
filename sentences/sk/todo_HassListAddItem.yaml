      - sentences:
          - "([pri](da(j|ť))|(pri|do)pí(š|sať)) [položku] <item> (do|na) <my_list>"
        response: item_added
        requires_context:
          domain: todo
        expansion_rules:
          my_list: "[ môj[ho]] [zoznam[u]] {name}"
          item: "{todo_list_item:item}"
